# ============================================================
#  GitHub Actions - Compilar ArmorPaint (Linux) v2
#  Coloca este archivo en: .github/workflows/build-armorpaint.yml
# ============================================================
#
#  CÓMO USARLO:
#  1. Sube este archivo a tu fork (NO lo borres después)
#  2. Ve a pestaña "Actions" -> "Build ArmorPaint Linux"
#  3. Pulsa "Run workflow" -> "Run workflow" (botón verde)
#  4. Espera ~5 min y descarga el ZIP desde "Artifacts"
# ============================================================

name: Build ArmorPaint Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente con submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            make clang \
            libvulkan-dev libgtk-3-dev \
            libssl-dev libxi-dev \
            libxrandr-dev libxcursor-dev \
            mesa-vulkan-drivers

      - name: Buscar binario generado
        run: find paint -type f -name "ArmorPaint" -o -name "*.bin" | head -20

      - name: Subir binario como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-Linux
          path: |
            paint/ArmorPaint
            paint/build/krom/
          retention-days: 7
          if-no-files-found: warn
