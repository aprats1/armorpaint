name: Build ArmorPaint Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente con submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            make clang \
            libvulkan-dev libgtk-3-dev \
            libssl-dev libxi-dev \
            libxrandr-dev libxcursor-dev \
            mesa-vulkan-drivers

      - name: Compilar
        working-directory: paint
        run: ../base/make --compiler clang --compile

      - name: Buscar binario generado
        run: find . -type f -name "ArmorPaint" | head -20

      - name: Subir binario como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-Linux
          path: paint/build/Release/
          retention-days: 7
          if-no-files-found: warn
