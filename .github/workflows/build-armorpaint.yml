# ============================================================
#  GitHub Actions - Compilar ArmorPaint (Linux)
#  Repositorio: github.com/armory3d/armortools
# ============================================================
#
#  INSTRUCCIONES:
#  1. Haz fork de https://github.com/armory3d/armortools
#  2. En tu fork, crea la carpeta: .github/workflows/
#  3. Sube este archivo dentro de esa carpeta
#  4. Ve a la pestaña "Actions" de tu fork
#  5. Selecciona "Build ArmorPaint Linux" y pulsa "Run workflow"
#  6. Cuando termine (~5-10 min), descarga el artefacto
#     desde la sección "Artifacts" al final de la ejecución
# ============================================================

name: Build ArmorPaint Linux

on:
  # Solo se ejecuta cuando TÚ lo activas manualmente.
  # No se lanza solo, no sube nada, no hace nada en segundo plano.
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente con todos sus submódulos
      - name: Descargar código fuente (con submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Instalar dependencias de compilación
      #    (lista oficial de la wiki de armortools para Debian/Ubuntu)
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            make \
            clang \
            libvulkan-dev \
            libgtk-3-dev \
            libssl-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            mesa-vulkan-drivers \
            vulkan-tools

      # 3. Compilar ArmorPaint con Vulkan (OpenGL ya no está soportado)
      - name: Compilar
        working-directory: paint
        run: |
          ../base/make --compiler clang --compile

      # 4. Comprimir el resultado para facilitar la descarga
      - name: Preparar artefacto
        run: |
          cd paint
          mkdir -p ../armorpaint-linux
          cp -r build/krom ../armorpaint-linux/
          cp base/Deployment/ArmorPaint ../armorpaint-linux/ 2>/dev/null || true
          ls -lah ../armorpaint-linux/

      # 5. Subir el binario compilado como artefacto descargable
      #    Disponible durante 7 días desde la pestaña Actions
      - name: Subir binario compilado
        uses: actions/upload-artifact@v4
        with:
          name: ArmorPaint-Linux-${{ github.sha }}
          path: armorpaint-linux/
          retention-days: 7
          if-no-files-found: warn
